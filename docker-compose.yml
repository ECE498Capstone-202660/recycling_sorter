services:
  mysql:
    image: mysql:8
    container_name: recycling-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./server/mysql_data:/var/lib/mysql  # Persistent data folder

  adminer:
    image: adminer
    container_name: recycling-adminer
    restart: always
    ports:
      - "8090:8080"  # Adminer web UI